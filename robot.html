<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Lab - Mai's World</title>
    <style>
        /* --- ĐOẠN MỚI THÊM: ẨN CHUỘT VÀ TẠO HÌNH CON CÁ --- */
        *, *::before, *::after, body {
            cursor: none !important; /* Ẩn hoàn toàn chuột mặc định */
        }
        .fish-cursor {
            position: fixed;
            width: 150px; /* Độ rộng của con cá */
            height: auto;
            pointer-events: none; /* Tránh cản trở việc click nút bấm */
            z-index: 9999; /* Luôn nổi lên trên cùng */
            transform: translate(-50%, -50%); /* Căn giữa tâm con cá vào đầu chuột */
            transition: transform 0.05s ease-out; /* Tạo độ mượt nhẹ khi cá bơi theo */
        }
        /* ------------------------------------------------ */

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 800px;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        .project-img {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 25px;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #666;
            text-align: justify;
            margin-bottom: 30px;
        }
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .back-btn {
            display: inline-block;
            padding: 12px 24px;
            background: #34495e;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }
        .back-btn:hover {
            background: #2c3e50;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <!-- THẺ CON CÁ (Đổi assets/mat.jpg thành link ảnh con cá chuẩn của bạn nếu cần) -->
    <img src="assets/avatar.png" class="fish-cursor" id="fishCursor">

    <div class="container">
        <h1>🤖 Robot Lab</h1>
        <div style="display: flex; justify-content: center; gap: 10px; margin: -10px 0 25px 0; flex-wrap: wrap;">
            <span style="background: #ede7f6; color: #5e35b1; padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; border: 1px solid #d1c4e9;">💻 Embedded Programming</span>
            <span style="background: #e8f5e9; color: #2e7d32; padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; border: 1px solid #c8e6c9;">🔧 Hardware Engineer</span>
        </div>
        <img class="project-img" src="assets/xemohinh.jpg" alt="Robot Lab">
        <p>
            Robotics projects involving line-following robots, Micromouse development, circuit assembly, and electronic soldering.
        </p>
        <a href="index.html" class="back-btn">⬅ Quay lại Thế giới</a>
    </div>

    <!-- ĐOẠN SCRIPT ĐIỀU KHIỂN CÁ CHẠY THEO CHUỘT -->
    <script>
        const fish = document.getElementById('fishCursor');
        let lastX = 0;

        document.addEventListener('mousemove', (e) => {
            // Cập nhật vị trí cá theo tọa độ chuột
            fish.style.left = e.clientX + 'px';
            fish.style.top = e.clientY + 'px';

            // Xoay đầu cá sang trái/phải dựa theo hướng di chuyển của chuột
            if (e.clientX < lastX) {
                fish.style.transform = 'translate(-50%, -50%) scaleX(-1)'; // Quay đầu sang trái
            } else if (e.clientX > lastX) {
                fish.style.transform = 'translate(-50%, -50%) scaleX(1)';  // Quay đầu sang phải
            }
            lastX = e.clientX;
        });
    </script>
</body>
</html>
