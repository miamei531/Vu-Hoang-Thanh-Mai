<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awards - Mai's World</title>
    <style>
        *, *::before, *::after, body { cursor: none !important; }
        .fish-cursor { position: fixed; width: 90px; height: auto; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); transition: transform 0.05s ease-out; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #fffbeb; color: #451a03; margin: 0; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 800px; background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(245, 158, 11, 0.15); text-align: center; }
        h1 { color: #d97706; font-size: 2.5rem; margin-bottom: 20px; }
        .project-img { width: 100%; max-height: 400px; object-fit: cover; border-radius: 12px; margin-bottom: 25px; }
        p { font-size: 1.1rem; line-height: 1.8; color: #78350f; text-align: justify; margin-bottom: 30px; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 12px; margin-bottom: 30px; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .back-btn { display: inline-block; padding: 12px 24px; background: #d97706; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .back-btn:hover { background: #b45309; transform: translateY(-2px); }
    </style>
</head>
<body>
    <img src="assets/avatar.png" class="fish-cursor" id="fishCursor">
    <div class="container">
        <h1>🏆 Awards & Achievements</h1>
    <ul>
        <li>First Prize – City-Level Science and Technology Research Competition</li>
        <li>First Prize – Racing Car Competition</li>
        <li>Consolation Prize – BKI Competition</li>
        <li>Vice Head of STEM Club</li>
        <li>Head of IT Communications – IT Club</li>
    </ul>
        <a href="index.html" class="back-btn">⬅ Quay lại Thế giới</a>
    </div>
    <script>
        const fish = document.getElementById('fishCursor'); let lastX = 0;
        document.addEventListener('mousemove', (e) => {
            fish.style.left = e.clientX + 'px'; fish.style.top = e.clientY + 'px';
            if (e.clientX < lastX) fish.style.transform = 'translate(-50%, -50%) scaleX(-1)';
            else if (e.clientX > lastX) fish.style.transform = 'translate(-50%, -50%) scaleX(1)';
            lastX = e.clientX;
        });
    </script>
</body>
</html>
